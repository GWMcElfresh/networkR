# Lung + Draining Lymph Node — Bidirectional Template
#
# Starting point: generated by networkr_generate_configuration_from_data, then
# refined via networkr_refine_configuration_from_scaffold.
#
# Generator workflow (recommended):
#   1. networkr_generate_configuration_from_data("path/to/data.csv")
#   2. Review the reviewScaffold in the response.
#      Move columns between roles in the columnRoles block as needed.
#   3. networkr_refine_configuration_from_scaffold(scaffold_yaml, "path/to/data.csv")
#   4. networkr_write_configuration_file("configs/my_analysis.yml", yamlText)
#   5. networkr_validate_configuration_file("configs/my_analysis.yml")
#   6. networkr_run_pipeline_from_config("configs/my_analysis.yml")
#
# File format: wide_by_tissue (one row per subject-tissue pair).
# Measurement columns are inferred automatically from the data.
# -----------------------------------------------------------------------

study:
  studyName: "Lung And Draining LN Cell Abundance Network"
  randomSeed: 42

data:
  # ---- ingest settings ----
  dataPath: "../data"
  filePattern: "[.](xlsx|csv)$"
  inputFormat: "wide_by_tissue"   # one row per subject × tissue; measurements in columns

  # ---- column mapping (edit to match your file's column names) ----
  idColumn: "SubjectId"
  tissueColumn: "Tissue"
  groupColumn: "GroupName"
  rawTimepointColumn: "Timepoint"
  analysisTimepointColumn: "Timepoint"
  protectionColumn: "OutcomeColumn"

  # ---- tissue label map (filename fragment → prefix used in wide columns) ----
  # More-specific fragments must appear before generic ones.
  tissueMap:
    lung_draining_lymph_node: "LDLN"
    draining_ln: "LDLN"
    ldln: "LDLN"
    lung: "Lung"

  # ---- measurement columns ----
  # Set inferMeasurementColumns: true to have networkR detect numeric measurement
  # columns automatically (excluding design columns listed above).
  # Set it to false and list measurementColumns explicitly for full control.
  inferMeasurementColumns: true
  # measurementColumns:
  #   - "Lung_TotalMyeloids"
  #   - "Lung_TotalTCells"
  #   - "LDLN_TotalMyeloids"
  #   - "LDLN_TotalTCells"

variables:
  exogenousVariables:
    - "GroupName"
    - "Timepoint"
  stratifierVariables:
    - "OutcomeColumn"
  derivedVariables: {}

  measurementGroups:
    # Both groups at the same tier — leaves lung ↔ LDLN direction unconstrained.
    - groupName: "lungCells"
      columnPrefixes: ["Lung_"]
      tier: 2
      fillColour: "lightsteelblue1"
      borderColour: "steelblue4"
    - groupName: "ldlnCells"
      columnPrefixes: ["LDLN_"]
      tier: 2
      fillColour: "mistyrose"
      borderColour: "firebrick4"

imputation:
  method: "pmm"
  numberOfImputations: 5
  maximumIterations: 20
  completeDataAction: 1
  excludedPredictors:
    - "SubjectId"
    - "OutcomeColumn"

discretization:
  method: "factors"
  initialBreaks: 20
  finalBreaks: 3
  fallbackMethod: "quantile"
  fallbackBreaks: 2

structureLearning:
  backend: "stagedtrees"
  stagedtreesAlgorithm: "fbhc"
  stagedtreesLambda: 0
  algorithms: ["hillClimbing", "tabu"]
  score: "bic"
  selectedBootstrapAlgorithm: "tabu"
  bootstrapReplicates: 500
  bootstrapCores: 1
  averageNetworkThreshold: 0.4
  parameterMethod: "bayes"
  imaginarySampleSize: 1

stratifications: []

plotting:
  themeName: "article"
  baseSize: 13
  networkLayout: "fr"
  edgeLabelThreshold: 0.2
  comparisonBarThreshold: 0.15
  groupColours:
    exogenous:
      fillColour: "mistyrose"
      borderColour: "firebrick"
    defaultMeasurement:
      fillColour: "grey85"
      borderColour: "grey30"
  save:
    width: 13
    height: 8
    dpi: 300
    bg: "white"
    device: "png"

output:
  savePlots: false
  outputDirectory: "../outputs/lung_ldln_bidirectional"
